<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title data-meta="title">Wordul — race your friends on the same word</title>
<meta name="description" data-meta="description" content="Wordul — race your friends on the same word. Pick a username, get a profile, keep score across games." />
<link rel="canonical" data-meta="canonical" href="https://wordul.com/" />
<meta property="og:title" data-meta="og:title" content="Wordul" />
<meta property="og:description" data-meta="og:description" content="Race your friends on the same word." />
<meta property="og:url" data-meta="og:url" content="https://wordul.com/" />
<meta property="og:image" content="/og.png" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="theme-color" content="#0e0e10" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23538d4e'/%3E%3Ctext x='50%25' y='52%25' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui,sans-serif' font-weight='800' font-size='40'%3EW%3C/text%3E%3C/svg%3E" />
<script>
  // Set the edition before first paint to avoid a flash of the wrong theme.
  try {
    document.documentElement.dataset.edition =
      localStorage.getItem("wordul.edition") || "default";
  } catch (e) {}
</script>
<link rel="stylesheet" href="/style.css" />
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebApplication",
      "name": "Wordul",
      "url": "https://wordul.com",
      "description": "Race your friends on the same word. No password — pick a username, get a public profile, create a room, share the link, and keep score across games.",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Any (web browser)",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    },
    {
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do I need an account to play Wordul?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. Pick a username and you're recognized anywhere just by typing it again — no password, no signup." }
        },
        {
          "@type": "Question",
          "name": "How do I invite friends?",
          "acceptedAnswer": { "@type": "Answer", "text": "Create a room and share its link (wordul.com/@your-name/room-name). Anyone who opens it picks a username and joins the same race." }
        },
        {
          "@type": "Question",
          "name": "Does it keep score?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Every room keeps a running scoreboard across rounds, and each player has a public profile with lifetime stats and past games." }
        }
      ]
    }
  ]
}
</script>
<script type="application/ld+json" data-daily-jsonld></script>
</head>
<body>
<header class="topbar">
  <div class="topbar-left">
    <button id="brandBtn" class="brand" type="button" title="Home" aria-label="Wordul — home">Wordul<span class="brand-dot">.</span></button>
    <nav id="crumbs" class="crumbs" aria-label="Breadcrumb" hidden></nav>
  </div>
  <!-- Immersive in-game header (C5): avatar + username + gold only. The avatar IS
       the hub — one tap opens settings / theme / mute / stats (+ share / rename /
       scoreboard in a room), replacing the old scattered ⚙ / 📊 / 🔊 icons. The
       gold HUD is appended here by renderGoldHud (it targets .room-header first). -->
  <div class="topbar-actions">
    <button id="chatTopBtn" class="icon-btn topbar-chat-btn" title="Chat" aria-label="Chat" hidden>
      💬<span id="chatTopBadge" class="topbar-chat-badge" hidden>0</span>
    </button>
    <div class="room-header" id="roomHeader"></div>
    <!-- Home-only identity: gold + streak. Revealed by body.hub-home (the hub is up);
         hidden in rooms, where #goldHud after #roomHeader owns the in-room gold. -->
    <div class="topbar-stats" id="topbarStats">
      <span class="hub-stat-glyph" id="hubGold" title="Gold">◆ <span id="hubGoldVal">0</span></span>
      <span class="hub-stat-glyph" id="hubStreak" title="Streak" hidden>🔥 <span id="hubStreakVal">0</span></span>
    </div>
    <button id="avatarBtn" class="avatar-btn" type="button" title="Menu" aria-label="Menu" aria-haspopup="true">◆</button>
  </div>
</header>

<main id="app">
  <!-- Screens injected by app.js -->
  <!-- Crawlable daily prose: HTMLRewriter fills this for /daily/<date> (hidden from users;
       the SPA replaces #app on boot). NOT wrapped in <noscript> — HTMLRewriter parses
       noscript contents as raw text, so a selector inside it would never match. -->
  <div data-daily-prose hidden></div>
</main>

<!-- Templates -->
<template id="tpl-home">
  <section class="screen home">
    <!-- Ambient gold orbs — pure decoration, reduced-motion safe. -->
    <div class="home-aura" aria-hidden="true"><span class="orb orb-a"></span><span class="orb orb-b"></span></div>

    <!-- Returning user: greeting + switch-user. Hidden for new users. -->
    <div id="homeGreeting" class="home-greeting" hidden>
      <h1 class="greeting-title">👋 Welcome back, <span id="greetingName" class="greeting-name">@you</span></h1>
      <p class="muted small">Not you? <button id="switchUserBtn" type="button" class="linklike">switch user</button></p>
    </div>

    <!-- New user: tagline + username field. Collapsible via switch-user. -->
    <div id="homeIntro" class="home-intro">
      <h1 class="tagline">Race your friends on the same word.</h1>
      <p class="sub">No password. Pick a username, share a link, keep score.</p>
      <label class="field">
        <span>Your username</span>
        <input id="usernameInput" maxlength="20" placeholder="e.g. yan" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
      </label>
    </div>

    <!-- How to play — cleaner, near the top. -->
    <a href="/how-to-play" class="home-howto link">How to play →</a>

    <div class="home-cta">
      <button id="startPlayingBtn" class="btn primary block hero-btn"><span class="hero-btn-label">▶ Start playing</span></button>
    </div>

    <!-- Returning user: recent rooms to rejoin. Hidden when empty or for new users. -->
    <section id="homeRooms" class="home-rooms" hidden>
      <span class="home-rooms-label">Recent</span>
      <ul id="roomList" class="room-list"></ul>
    </section>

    <!-- Hub shell — shown once the user has a profile; replaces the intro flow. -->
    <div id="hub" class="hub" hidden>
      <!-- Drifting aurora light orbs — pure decoration, reduced-motion safe. -->
      <div class="hub-aurora" aria-hidden="true">
        <span class="hub-orb hub-orb-uv"></span>
        <span class="hub-orb hub-orb-gold"></span>
        <span class="hub-orb hub-orb-teal"></span>
      </div>
      <main id="hubContent" class="hub-content"></main>
    </div>
  </section>
</template>

<template id="tpl-room">
  <section class="screen room">
    <div class="lobby-bar">
      <!-- The name IS the share: tap it to copy the room link. Rename + invite still
           live in the avatar hub; length + theme in the gear. Three things only. -->
      <div class="room-info">
        <button type="button" class="room-name" id="roomName" title="Copy room link"></button>
        <span id="modeChip" class="mode-chip" hidden></span>
      </div>
      <div id="lobbyControls" class="lobby-controls" hidden>
        <div id="modeControl" class="mode-control" hidden>
          <span class="label" id="modeHeading">Choose a mode</span>
          <ul id="modeList" class="mode-list" role="radiogroup" aria-label="Game mode"></ul>
        </div>
        <button type="button" id="lobbySetup" class="lobby-setup" aria-label="Room setup" title="Length · theme" hidden>⚙</button>
        <button id="startBtn" class="btn primary small" hidden>Start game</button>
      </div>
      <div id="endControls" class="lobby-controls" hidden>
        <button id="rematchBtn" class="btn primary small" hidden>Play again</button>
      </div>
    </div>

    <nav id="roomTabs" class="room-tabs" role="tablist" aria-label="Room views">
      <button class="room-tab is-active" data-tab="play" role="tab" type="button">Play</button>
      <button class="room-tab" data-tab="games" role="tab" type="button">Games</button>
      <button class="room-tab" data-tab="players" role="tab" type="button">Players</button>
    </nav>

    <div id="tabPlay" class="room-tab-panel">
      <!-- Top cluster: one-line hacker-log ticker + the ✨/💀 affordances, kept ABOVE the
           board. Nothing ever sits between the board and the keyboard — on mobile that gap
           gets eaten by the on-screen keyboard / forces a scroll. -->
      <div id="hacklog" class="hacklog" hidden></div>
      <div class="magic-bar">
        <button id="magicBtn" class="magic-icon" type="button" title="Power-ups" aria-label="Power-ups" aria-haspopup="true" hidden>✨</button>
        <button id="giveUpBtn" class="give-up-icon" type="button" title="Give up" aria-label="Give up" hidden>💀</button>
        <div id="magicPopover" class="magic-popover" role="menu" aria-label="Power-ups" hidden></div>
      </div>
      <p id="powerHints" class="power-hints" hidden></p>

      <div id="boards" class="boards"></div>
      <div id="messageRow" class="message-row" aria-live="polite"></div>
      <section id="dailyUnlock" class="daily-unlock" hidden>
        <p class="daily-goody" id="dailyGoody"></p>
        <article class="daily-story" id="dailyStory"></article>
        <div class="daily-bridge">
          <a href="/" class="btn primary block daily-bridge-btn" id="dailyBridgeBtn"></a>
          <a href="/daily/archive" class="link daily-bridge-link" id="dailyArchiveLink"></a>
        </div>
      </section>
      <div id="keyboard" class="keyboard" aria-label="On-screen keyboard"></div>
    </div>

    <div id="tabGames" class="room-tab-panel" hidden>
      <div id="gamesPanel" class="games-panel"></div>
    </div>

    <div id="tabPlayers" class="room-tab-panel" hidden>
      <div id="scoreboard" class="scoreboard" hidden></div>
    </div>

    <div id="chatBackdrop" class="chat-backdrop" hidden></div>
    <section id="chatPanel" class="chat-panel" aria-label="Chat" hidden>
      <button id="chatToggle" class="chat-toggle" type="button" aria-expanded="true">
        <span class="chat-toggle-label">Chat</span>
        <span id="chatBadge" class="chat-badge" hidden>0</span>
        <span class="chat-toggle-caret" aria-hidden="true">▾</span>
        <button id="chatCloseBtn" class="chat-close-btn" type="button" aria-label="Close chat">✕</button>
      </button>
      <div id="chatBody" class="chat-body">
        <div id="chatLog" class="chat-log" role="log" aria-live="polite"></div>
        <form id="chatForm" class="chat-form" autocomplete="off">
          <input id="chatInput" class="chat-input" maxlength="200" placeholder="Say something…" />
          <button type="submit" class="chat-send" aria-label="Send">↑</button>
        </form>
      </div>
    </section>
  </section>
</template>

<template id="tpl-profile">
  <section class="screen profile">
    <a id="profileBack" href="/" class="link profile-back">← Home</a>
    <div id="profileMount" class="profile-mount"></div>
  </section>
</template>

<!-- Stats modal -->
<div id="statsModal" class="modal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-card" role="dialog" aria-label="Statistics">
    <button class="modal-close" data-close aria-label="Close">✕</button>
    <h2 class="modal-title">STATISTICS</h2>
    <div class="stats-grid">
      <div><div class="stat-num" id="statPlayed">0</div><div class="stat-label">Played</div></div>
      <div><div class="stat-num" id="statWinPct">0</div><div class="stat-label">Win %</div></div>
      <div><div class="stat-num" id="statCurStreak">0</div><div class="stat-label">Current Streak</div></div>
      <div><div class="stat-num" id="statMaxStreak">0</div><div class="stat-label">Max Streak</div></div>
    </div>
    <h3 class="modal-subtitle">GUESS DISTRIBUTION</h3>
    <div id="dist" class="dist"></div>
    <div id="endgameMsg" class="endgame" hidden></div>
    <p id="challengeRecordLine" class="challenge-record"></p>
    <div class="modal-actions">
      <button id="modalChallenge" class="btn block challenge-cta" type="button">Challenge a friend</button>
      <button id="modalPlayAgain" class="btn ghost block" hidden>Play again <span class="cta-replay">⟳</span></button>
      <div class="modal-divider"><span>or share the link</span></div>
      <div class="share-row">
        <input class="share-url" id="shareUrl" readonly />
        <button class="share-copy" id="shareCopy" type="button">Copy</button>
        <button class="share-native" id="modalShare" type="button">Share</button>
      </div>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div id="settingsModal" class="modal" hidden>
  <div class="modal-backdrop" data-close-settings></div>
  <div class="modal-card settings-card" role="dialog" aria-label="Settings">
    <button class="modal-close" data-close-settings aria-label="Close">✕</button>
    <h2 class="modal-title">SETTINGS</h2>

    <!-- Collapsible chevron sections (C6) — all collapsed on open ("calm"). Less
         colour and noise; keyboard layout tucked under "Advanced". -->

    <!-- Room setup — shown only when you're in a room. Word length lives here now
         (moved out of the lobby); theme is in Appearance below. Disabled mid-game. -->
    <section class="settings-section" id="roomSettingsSection" hidden>
      <button type="button" class="settings-section-head" aria-expanded="false">
        <span class="settings-section-title">Room</span>
        <span class="settings-chevron" aria-hidden="true">›</span>
      </button>
      <div class="settings-section-body">
        <div class="setting-row">
          <div class="setting-text">
            <div class="setting-name">Word length</div>
            <div class="setting-desc">Letters per word — set before the game starts</div>
          </div>
          <select id="lengthSelect" class="length-select" aria-label="Word length"></select>
        </div>
      </div>
    </section>

    <section class="settings-section">
      <button type="button" class="settings-section-head" aria-expanded="false">
        <span class="settings-section-title">Appearance</span>
        <span class="settings-chevron" aria-hidden="true">›</span>
      </button>
      <div class="settings-section-body">
        <div class="setting-row stack">
          <div class="setting-text">
            <div class="setting-name">Theme</div>
            <div class="setting-desc">Pick a look — and a companion who talks while you play</div>
          </div>
          <div id="editionPicker" class="edition-picker"></div>
        </div>
        <label class="setting-row" for="setColorBlind">
          <div class="setting-text">
            <div class="setting-name">Color Blind Mode</div>
            <div class="setting-desc">High-contrast colors (blue / orange)</div>
          </div>
          <span class="switch">
            <input type="checkbox" id="setColorBlind" />
            <span class="switch-slider" aria-hidden="true"></span>
          </span>
        </label>
      </div>
    </section>

    <section class="settings-section">
      <button type="button" class="settings-section-head" aria-expanded="false">
        <span class="settings-section-title">Gameplay</span>
        <span class="settings-chevron" aria-hidden="true">›</span>
      </button>
      <div class="settings-section-body">
        <label class="setting-row" for="setHardMode">
          <div class="setting-text">
            <div class="setting-name">Hard Mode</div>
            <div class="setting-desc">Any revealed hints must be used in subsequent guesses</div>
          </div>
          <span class="switch">
            <input type="checkbox" id="setHardMode" />
            <span class="switch-slider" aria-hidden="true"></span>
          </span>
        </label>
        <label class="setting-row" for="setReducedMotion">
          <div class="setting-text">
            <div class="setting-name">Reduced Motion</div>
            <div class="setting-desc">Skip the flip + explosion animations</div>
          </div>
          <span class="switch">
            <input type="checkbox" id="setReducedMotion" />
            <span class="switch-slider" aria-hidden="true"></span>
          </span>
        </label>
      </div>
    </section>

    <section class="settings-section">
      <button type="button" class="settings-section-head" aria-expanded="false">
        <span class="settings-section-title">Advanced</span>
        <span class="settings-chevron" aria-hidden="true">›</span>
      </button>
      <div class="settings-section-body">
        <label class="setting-row" for="setCommunityScience">
          <div class="setting-text">
            <div class="setting-name">Community science</div>
            <div class="setting-desc">Contribute anonymized gameplay patterns to public research</div>
          </div>
          <span class="switch">
            <input type="checkbox" id="setCommunityScience" />
            <span class="switch-slider" aria-hidden="true"></span>
          </span>
        </label>
        <div class="setting-row stack">
          <div class="setting-text">
            <div class="setting-name">Keyboard</div>
            <div class="setting-desc">Auto-detects QWERTY / AZERTY — pick one to pin it</div>
          </div>
          <div id="layoutPicker" class="edition-picker"></div>
        </div>
      </div>
    </section>
  </div>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
